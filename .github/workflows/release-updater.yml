name: Release Updater

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to publish (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-updater-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-sign-and-upload:
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      UPDATER_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag_name }}".Trim()
          } else {
            $tag = "${{ github.ref_name }}".Trim()
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Release tag is empty."
          }
          "value=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Using release tag: $tag"

      - name: Ensure signing secret is present
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY secret. Add the updater private key in repository secrets."
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build signed installer
        run: npm run tauri:build

      - name: Prepare updater manifest and artifacts
        run: node scripts/prepare-updater-release.mjs

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.value }}
          files: |
            output/updater/latest.json
            output/updater/*.exe
            output/updater/*.sig
          fail_on_unmatched_files: true
